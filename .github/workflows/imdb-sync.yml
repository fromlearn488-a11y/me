name: IMDB Watch History Sync

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "JSON payload from browser scraper"
        required: true
        type: string

jobs:
  save-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write payload to file
        run: |
          mkdir -p data
          cat > /tmp/payload.json << 'PAYLOAD_EOF'
          ${{ github.event.inputs.payload }}
          PAYLOAD_EOF

      - name: Process and save watch history
        run: |
          cat > /tmp/process.py << 'PYEOF'
          import json, os
          from datetime import datetime

          with open("/tmp/payload.json") as f:
              data = json.load(f)

          items = data.get("items", [])
          scraped_at = data.get("scrapedAt", datetime.utcnow().isoformat())
          print(f"Got {len(items)} items scraped at {scraped_at}")

          os.makedirs("data", exist_ok=True)
          history_path = "data/watch_history.json"

          if os.path.exists(history_path):
              with open(history_path) as f:
                  existing = json.load(f)
          else:
              existing = []

          existing_ids = {e["imdbId"] for e in existing if "imdbId" in e}
          new_items = [i for i in items if i.get("imdbId") not in existing_ids]
          merged = existing + new_items
          merged.sort(key=lambda x: x.get("title", ""))

          with open(history_path, "w") as f:
              json.dump(merged, f, indent=2)

          print(f"Added {len(new_items)} new. Total: {len(merged)}")

          # Generate README
          lines = [
              "# 🎬 IMDB Watch History",
              "",
              f"> Last synced: {scraped_at[:10]}  |  Total watched: **{len(merged)}**",
              "",
              "| # | Title | Year | Runtime | Rating | IMDB |",
              "|---|-------|------|---------|--------|------|",
          ]
          for i, m in enumerate(merged, 1):
              imdb_link = f"[↗](https://www.imdb.com/title/{m['imdbId']}/)" if m.get("imdbId") else ""
              rating = f"⭐ {m['imdbRating']}" if m.get("imdbRating") else "—"
              lines.append(
                  f"| {i} | **{m.get('title','?')}** | {m.get('year','—')} | {m.get('runtime','—')} | {rating} | {imdb_link} |"
              )

          lines += [
              "",
              "---",
              "_Auto-generated by [imdb-scraper](./imdb-scraper.js). Run the browser script on your IMDB watch history page to sync._",
          ]

          with open("README.md", "w") as f:
              f.write("\n".join(lines))

          print("README.md updated!")
          PYEOF
          python3 /tmp/process.py

      - name: Commit updated history + README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watch_history.json README.md
          git diff --cached --quiet || git commit -m "sync: IMDB watch history $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
